services:
  - type: web
    name: voice-chatbot-senior
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEYS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: APP_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: CALL_PROVIDER
        value: zegocloud
      - key: CALL_RING_TIMEOUT_SECONDS
        value: "30"
      - key: CALL_MAX_TARGETS
        value: "3"
      - key: ANDROID_APP_DOWNLOAD_URL
        value: ""
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
